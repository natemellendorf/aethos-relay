services:
  relay:
    build:
      context: .
      dockerfile: Dockerfile
    image: aethos-relay:local
    container_name: aethos-relay
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - aethos-relay-data:/var/lib/aethos
    command:
      - -ws-addr=:8080
      - -http-addr=:8081
      - -store-path=/var/lib/aethos/relay.db

volumes:
  aethos-relay-data:
